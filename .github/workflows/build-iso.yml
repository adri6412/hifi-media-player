name: Build HiFi Player ISO Appliance

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger

jobs:
  build-iso:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y live-build debootstrap squashfs-tools mtools xorriso fakeroot dpkg-dev alsa-utils

    - name: Setup Live-Build Environment
      run: |
        # Configura l'ambiente e crea le cartelle per la build
        chmod +x build-iso.sh

        # Eseguiamo il build in due step: l'app e poi l'ISO (richiede sudo per live-build)
        ./build-iso.sh

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: hifi-player-installer.iso
        path: hifi-player-installer.iso
        retention-days: 7
