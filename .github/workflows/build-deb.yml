name: Build HiFi Player App (.deb)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Publish to GitHub Release when triggered by a tag
permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest

    # Skip if this is a companion app release tag
    if: ${{ !contains(github.ref, 'companion') }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build App (deb)
      run: npm run package -- --linux deb --publish never
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish to GitHub Release
      if: github.ref_type == 'tag'
      uses: softprops/action-gh-release@v2
      with:
        prerelease: ${{ contains(github.ref_name, '-') }}
        files: |
          dist/*.deb

    - name: Upload .deb Artifact (manual runs)
      if: github.ref_type != 'tag'
      uses: actions/upload-artifact@v4
      with:
        name: hifi-media-player-deb
        path: dist/*.deb
        retention-days: 7
